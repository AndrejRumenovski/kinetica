name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: fmt + clippy + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable, with rustfmt + clippy)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry and build artifacts
        uses: Swatinem/rust-cache@v2

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy (deny warnings)
        run: cargo clippy --all-targets --locked -- -D warnings

      - name: cargo test
        run: cargo test --all-targets --locked

  fuzz-smoke:
    name: fuzz smoke test (reactions_lut_parse)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (nightly, required by cargo-fuzz/libFuzzer)
        uses: dtolnay/rust-toolchain@nightly

      - name: Cache cargo registry and build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "fuzz -> target"

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked

      - name: Fuzz reactions_lut_parse for 60s
        # A short, bounded run on every push -- not a substitute for a
        # real fuzzing campaign, but enough to catch a regression that
        # breaks ReactionLut::open's "never panic/UB on arbitrary bytes"
        # property before it reaches main. Run locally with a longer
        # -max_total_time for real fuzzing (see README's "Fuzzing" section).
        run: cargo fuzz run reactions_lut_parse -- -max_total_time=60
