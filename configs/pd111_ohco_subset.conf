# kinetica config: Pd(111), O/H/CO only -- a deliberately narrower subset
# of configs/pd111.conf, dropping OH and H2O.
#
# Exists purely as a generality demonstration: the config-driven
# generalization arc's whole point was that a species set narrower or
# wider than the original hardcoded 5 (O, H, CO, OH, H2O) should build a
# correct, corruption-free reactions.lut with *no source change* -- just
# a different config file. This is that proof, exercised by
# tests/subset_config_regression.rs against the same frozen real Pd(111)
# fixtures configs/pd111.conf's own regression test uses (no new binary
# data committed).
#
# Since OH is no longer declared, the `[bimolecular]` water-splitting
# entry (`h2o_dis`, which names OH) is dropped too -- a `[bimolecular]`
# row naming an undeclared species is a config *parse* error (see
# src/config.rs's `validate_bimolecular`), not just a build-time no-op.
# The frozen fixture's own real H*/OH* water-splitting bimolecular record
# still exists on disk in tests/fixtures/pd111_bimolecular.bin regardless
# -- oc20_ingest.rs skips it at read time instead (its species_b index,
# 3, no longer resolves against this 3-species config; see `run`'s own
# `config.species.get(...)` bounds check), which is exactly the "a smaller
# reaction set builds correctly" behavior this config exists to exercise.

[system]
metal = Pd
facet = 111

[bep]
alpha = 0.87
beta = 0.0
nu = 1e13
temperature = 298.15

[species]
# name = bit,   gas,     stoich, product,  role,          oc20_ads_id
O    = 0x01,   O2gas,   0.5,    Ostar,    dissociative,  0
H    = 0x04,   H2gas,   0.5,    Hstar,    dissociative,  1
CO   = 0x02,   COgas,   1.0,    COstar,   molecular,     5

[bimolecular]
# key = species_a, species_b, direction,     gas
co_ox   = O,  CO, recombination, CO2gas
h2_rec  = H,  H,  recombination, H2gas
