# kinetica config: Pd(111), 5 real species (O, H, CO, OH, H2O).
#
# Reproduces exactly the setup that used to be hardcoded into
# oc20_ingest.rs's compile-time SPECIES_NAMES/SPECIES_BITS/
# DISSOCIATIVE_SPECIES constants -- see src/config.rs's own doc comment
# for the file-format reference, and README's "Building reactions.lut
# from real data" section for how this feeds into a real run.

[system]
metal = Pd
facet = 111

[bep]
# Typical literature defaults, not fitted to this specific system --
# see oc20_ingest.rs's own module doc comment.
alpha = 0.87
beta = 0.0
nu = 1e13
temperature = 298.15

[species]
# name = bit,   gas,     stoich, product,  role,          oc20_ads_id
O    = 0x01,   O2gas,   0.5,    Ostar,    dissociative,  0
H    = 0x04,   H2gas,   0.5,    Hstar,    dissociative,  1
CO   = 0x02,   COgas,   1.0,    COstar,   molecular,     5
OH   = 0x08,   -,       -,      OHstar,   product_only,  -
H2O  = 0x10,   H2Ogas,  1.0,    H2Ostar,  molecular,     -

[bimolecular]
# key = species_a, species_b, direction,     gas
co_ox   = O,  CO, recombination, CO2gas
h2_rec  = H,  H,  recombination, H2gas
h2o_dis = H,  OH, dissociative,  H2Ogas
